name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Lint
        run: pnpm run lint

      # NOTE: wrangler/miniflare (via @opennextjs/cloudflare) と better-auth>vitest 経由の
      # CVE (undici, ws, vite 等) は Cloudflare Workers ランタイムでは動作しないビルドツールの
      # 間接依存であり、本番環境に影響しない。miniflare が undici を完全固定しているため
      # pnpm overrides でも解消不可。実際の本番コードに影響する脆弱性は手動で `pnpm audit` を確認。
      - name: Security audit (prod, informational)
        run: pnpm audit --prod --audit-level=high || true

name: Weekly Crawl & Auto PR

on:
  schedule:
    # 毎週月曜日 JST 9:00 (UTC 0:00) に実行
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ファイルを更新しない（dry-run）'
        required: false
        default: 'false'
        type: boolean

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run crawl (Messages API mode)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node tools/crawl/index.js --dry-run
          else
            node tools/crawl/index.js --no-cli
          fi

      - name: Run geocoding (dry-run for now)
        run: node scripts/geocode-venues.js --dry-run

      - name: Validate race data
        run: node scripts/validate-races.js || true

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet src/data/races/ tools/crawl/checksums.json && \
            echo "has_changes=false" >> $GITHUB_OUTPUT || \
            echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Generate seed SQL
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        run: node scripts/generate-seed-races.js

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: crawl/${{ github.run_id }}
          commit-message: "chore: 自動クロール結果反映 (${{ github.run_id }})"
          title: "chore: 自動クロール結果反映 (${{ github.run_id }})"
          body: |
            ## 自動クロール結果

            週次クロールで検出した大会情報の更新です。内容を確認してマージしてください。

            ### 変更ファイル

            ```
            ${{ steps.check_changes.outputs.diff_summary }}
            ```

            ### 品質チェック結果

            `validate:races` の結果は Actions ログを確認してください。

            > **自動マージはしません。** 必ず人がレビューしてからマージしてください。

            ---
            Generated by GitHub Actions workflow `crawl.yml`
          labels: |
            crawl
            auto-generated
          draft: false
